<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OfficeScrapper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="brand">Office<span>Scrapper</span></div>
  <div class="topbar-search">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <div class="search-box">
      <span class="street-chip" id="searchChip" style="display:none">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <span id="searchChipText"></span>
        <span class="street-chip-close" id="searchChipClose">&times;</span>
      </span>
      <input type="text" id="searchInput" placeholder="Buscar por direcci&#243;n, t&#237;tulo&#8230;">
    </div>
    <div class="search-suggestions" id="searchSuggestions"></div>
  </div>
  <div class="topbar-right">
    <span id="authBox">
      <input id="authEmail" type="email" placeholder="tu@correo.com" />
      <button class="btn-csv" id="login-btn">Entrar</button>
    </span>
    <span id="userBox" hidden>
      <span class="count-tag" id="userEmail"></span>
      <button class="btn-csv" id="logout-btn">Salir</button>
    </span>
    <span class="count-tag"><strong id="countNum">0</strong> de <strong id="countTotal">0</strong> listings</span>
    <button class="btn-csv" id="export-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Exportar CSV
    </button>
  </div>
</header>

<!-- FILTER BAR -->
<nav class="filterbar" id="filterbar">
  <div class="filter-group">
    <span class="filter-group-label">Estado</span>
    <button class="pill active" data-group="status" data-val="Todos">Todos</button>
    <button class="pill" data-group="status" data-val="Nuevo">Nuevo</button>
    <button class="pill" data-group="status" data-val="Revisado">Revisado</button>
    <button class="pill" data-group="status" data-val="Contactado">Contactado</button>
    <button class="pill" data-group="status" data-val="Rentado">Rentado</button>
    <button class="pill" data-group="status" data-val="Descartado">Descartado</button>
  </div>
  <div class="filter-group" id="fuente-group"></div>
  <div class="filter-group">
    <button class="pill" data-group="starred" data-val="Destacados">&#9733; Destacados</button>
  </div>
</nav>

<!-- STATS BAR -->
<div class="statsbar" id="statsBar"></div>

<!-- GRID -->
<main class="grid" id="grid"></main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="app.js"></script>
</body>
</html>
